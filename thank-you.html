<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Platinum Kitchens & Bedrooms</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0A0A0A;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .logo { height: 60px; margin: 0 auto 48px; }
    .logo img { height: 100%; width: auto; object-fit: contain; }
    .icon { margin-bottom: 28px; }
    .icon svg { width: 56px; height: 56px; color: #C0C0C0; }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 300;
      margin-bottom: 18px;
      line-height: 1.15;
    }
    h1 em { font-style: italic; color: #C0C0C0; }
    p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.8;
      max-width: 480px;
      margin-bottom: 8px;
    }
    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, #C0C0C0, transparent);
      margin: 40px auto;
    }
    a.btn {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 16px 36px;
      background: #C0C0C0;
      color: #0A0A0A;
      text-decoration: none;
      transition: background 0.3s;
    }
    a.btn:hover { background: #fff; }
  </style>
</head>
<body>
  <div class="logo"><img src="logo.png" alt="Platinum Kitchens & Bedrooms" /></div>
  <div class="icon">
    <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="26" stroke="currentColor" stroke-width="1.5"/>
      <polyline points="16,28 24,36 40,20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1>Thank you for your <em>enquiry</em></h1>
  <div class="divider"></div>
  <p>We've received your message and one of our design consultants will be in touch within 24 hours to discuss your project.</p>
  <p>In the meantime, feel free to call us on <a href="tel:0781458700" style="color:#C0C0C0;">078 145 8700</a>.</p>
  <div class="divider"></div>
  <a href="index.html" class="btn">← Back to Home</a>
</body>
</html>
